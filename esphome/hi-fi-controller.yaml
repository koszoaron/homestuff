esphome:
  name: hi-fi-controller
  friendly_name: Hi-Fi Controller
  devices:
    - id: pioneer_ctw620r
      name: "Pioneer CT-W620R"

esp32:
  board: esp32dev  #https://grobotronics.com/images/companies/1/71kEWzr29bL._AC_SL1001_.jpg
  framework:
    type: arduino

#external component for BLE keyboard github://dmamontov/esphome-blekeyboard

# Enable logging
logger:

# Enable Home Assistant API
api:
  encryption:
    key: !secret api_encryption_key
  reboot_timeout: 0s

ota:
  - platform: esphome
    password: !secret ota_password

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  use_address: 10.121.3.127

  # Enable fallback hotspot (captive portal) in case wifi connection fails
  ap:
    ssid: "Hi-Fi-Controller"

captive_portal:

remote_transmitter:
  pin: 
    number: GPIO13
    inverted: False
  carrier_duty_percent: 100%  # use 100% duty cycle because SR-Link is a baseband wired signal

uart:
  baud_rate: 9600
  rx_pin: GPIO16
  tx_pin: GPIO17
  id: amp_uart
  debug: 
    direction: BOTH
    dummy_receiver: false
    after:
      delimiter: "\r"
    sequence:
      - lambda: |-
          /* log the data */
          UARTDebug::log_string(direction, bytes);

serial_proxy:
  id: amp_rs232
  uart_id: amp_uart
  name: "Amplifier Serial Proxy"
  port_type: RS232
    
button:
  - platform: template
    name: "Deck 2 Reverse Play"
    icon: "mdi:menu-left-outline"
    device_id: pioneer_ctw620r
    on_press:
      - remote_transmitter.transmit_pioneer:
          rc_code_1: 0x8515  #21
